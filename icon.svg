<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0" stop-color="#3a2c12"/><stop offset=".55" stop-color="#241a0a"/><stop offset="1" stop-color="#0d0b12"/>
    </radialGradient>
    <linearGradient id="bl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe7a8"/><stop offset="1" stop-color="#caa05a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- three lanes hint -->
  <g opacity=".5">
    <rect x="150" y="92" width="60" height="328" rx="10" fill="#e0613f" opacity=".35"/>
    <rect x="226" y="92" width="60" height="328" rx="10" fill="#3fa3e0" opacity=".35"/>
    <rect x="302" y="92" width="60" height="328" rx="10" fill="#4fae5e" opacity=".35"/>
  </g>
  <!-- crossed sword + spear -->
  <g stroke-linecap="round" transform="rotate(45 256 256)">
    <line x1="256" y1="120" x2="256" y2="392" stroke="#0a0a10" stroke-width="34"/>
    <line x1="256" y1="120" x2="256" y2="392" stroke="url(#bl)" stroke-width="22"/>
    <path d="M256 110 l16 26 l-16 14 l-16 -14 z" fill="url(#bl)" stroke="#0a0a10" stroke-width="4"/>
    <rect x="206" y="330" width="100" height="16" rx="8" fill="#caa05a" stroke="#0a0a10" stroke-width="4"/>
  </g>
  <g stroke-linecap="round" transform="rotate(-45 256 256)">
    <line x1="256" y1="130" x2="256" y2="392" stroke="#0a0a10" stroke-width="30"/>
    <line x1="256" y1="130" x2="256" y2="392" stroke="#9aa6c0" stroke-width="18"/>
    <rect x="216" y="338" width="80" height="14" rx="7" fill="#7a663f" stroke="#0a0a10" stroke-width="4"/>
  </g>
  <circle cx="256" cy="256" r="26" fill="#ffe7a8" stroke="#0a0a10" stroke-width="6"/>
